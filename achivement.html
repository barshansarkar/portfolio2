    <div class="container">
        <div class="section-header">
            <p class="section-subtitle">Milestones</p>
            <h2 class="section-title">Featured Achievements</h2>
        </div>

        <div class="carousel-container">
            <div class="carousel-stage" id="carousel-stage">
                <!-- Cards will be dynamically generated -->
            </div>

            <div class="carousel-controls">
                <button id="prev-btn" class="nav-btn">‹</button>

                <div class="pagination-indicators" id="pagination-dots">
                    <!-- Dots will be dynamically generated -->
                </div>

                <button id="next-btn" class="nav-btn">›</button>
            </div>
        </div>
    </div>
    <style>
        /* Achievements Section Styling */
.achievements {
    padding: 8rem 0;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 40px;
    margin: 5rem 0;
    position: relative;
    overflow: hidden;
}

.achievements::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1), transparent 70%);
    z-index: -1;
}

/* Carousel Variables */
:root {
    --glass: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --blur: blur(20px);
    --shift-x: 30vw;
    --card-width: clamp(300px, 25vw, 450px);
    --card-height: clamp(400px, 60vh, 550px);
}

.carousel-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    perspective: 2000px;
    overflow: hidden;
    color: var(--text-light);
    width: 100%;
    padding: 2rem 0;
}

.carousel-stage {
    position: relative;
    width: 100vw;
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
}

.carousel-card {
    position: absolute;
    width: var(--card-width);
    height: var(--card-height);
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

/* 3D Transform States */
.carousel-card.active {
    transform: translate3d(0, 0, 250px) rotateY(0deg);
    z-index: 10;
    opacity: 1;
    box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.8),
        0 0 60px rgba(59, 130, 246, 0.3);
    border-color: var(--accent-blue);
}

.carousel-card.left {
    transform: translate3d(calc(var(--shift-x) * -1), 0, -150px) rotateY(35deg) scale(0.85);
    z-index: 5;
    opacity: 0.5;
}

.carousel-card.right {
    transform: translate3d(var(--shift-x), 0, -150px) rotateY(-35deg) scale(0.85);
    z-index: 5;
    opacity: 0.5;
}

.carousel-card.far-left {
    transform: translate3d(calc(var(--shift-x) * -1.8), 0, -500px) rotateY(45deg) scale(0.6);
    z-index: 1;
    opacity: 0.2;
}

.carousel-card.far-right {
    transform: translate3d(calc(var(--shift-x) * 1.8), 0, -500px) rotateY(-45deg) scale(0.6);
    z-index: 1;
    opacity: 0.2;
}

.carousel-card.hidden {
    transform: translate3d(0, 0, -1000px) scale(0.1);
    opacity: 0;
}

/* Card Inner Styling */
.card-image {
    height: 60%;
    background-size: cover;
    background-position: center;
    position: relative;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
}

.expand-badge {
    background: var(--gradient-primary);
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.card-content {
    padding: 25px;
    flex-grow: 1;
    background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.6));
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.card-header h3 {
    margin: 0;
    font-size: 1.3rem;
    font-weight: 700;
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.tag-pill {
    background: var(--gradient-primary);
    color: white;
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}

.card-content p {
    font-size: 0.95rem;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.6;
    margin: 15px 0;
}

.card-footer {
    font-size: 0.9rem;
    color: var(--accent-blue);
    font-weight: 600;
    margin-top: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-footer i {
    font-size: 0.8rem;
}

/* Controls */
.carousel-controls {
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 25px;
    background: var(--glass);
    backdrop-filter: var(--blur);
    padding: 12px 30px;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    min-width: 300px;
    justify-content: center;
}

.nav-btn {
    background: var(--gradient-primary);
    border: none;
    color: white;
    font-size: 1.8rem;
    cursor: pointer;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
}

.nav-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 15px 40px rgba(59, 130, 246, 0.5);
}

/* Pagination Dots */
.pagination-indicators {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 0 15px;
}

.dot {
    width: 8px;
    height: 8px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.dot.active {
    background: white;
    width: 24px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
}

.dot:hover:not(.active) {
    background: rgba(255, 255, 255, 0.6);
    transform: scale(1.3);
}

/* Light Theme Support */
[data-theme="light"] .carousel-card {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(0, 0, 0, 0.1);
}

[data-theme="light"] .card-content {
    background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.3));
}

[data-theme="light"] .carousel-controls {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(0, 0, 0, 0.1);
}

[data-theme="light"] .dot {
    background: rgba(0, 0, 0, 0.3);
}

[data-theme="light"] .dot.active {
    background: var(--accent-blue);
    box-shadow: 0 0 15px rgba(37, 99, 235, 0.5);
}

/* Responsive Design */
@media (max-width: 1200px) {
    :root {
        --shift-x: 32vw;
    }
}

@media (max-width: 1024px) {
    :root {
        --shift-x: 35vw;
    }

    .carousel-stage {
        height: 550px;
    }
}

@media (max-width: 768px) {
    :root {
        --shift-x: 38vw;
    }

    .carousel-card {
        width: 280px;
        height: 420px;
    }

    .carousel-stage {
        height: 500px;
    }

    .carousel-card.left {
        transform: translate3d(-45%, 0, -250px) rotateY(45deg) scale(0.8);
    }

    .carousel-card.right {
        transform: translate3d(45%, 0, -250px) rotateY(-45deg) scale(0.8);
    }

    .carousel-controls {
        padding: 10px 20px;
        gap: 15px;
    }

    .nav-btn {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
    }
}

@media (max-width: 576px) {
    .achievements {
        padding: 6rem 0;
        border-radius: 30px;
        margin: 3rem 0;
    }

    .carousel-card {
        width: 260px;
        height: 380px;
    }

    .carousel-stage {
        height: 450px;
    }

    .carousel-controls {
        padding: 8px 15px;
        gap: 10px;
    }

    .nav-btn {
        width: 40px;
        height: 40px;
        font-size: 1.3rem;
    }

    .pagination-indicators {
        gap: 6px;
    }

    .dot {
        width: 6px;
        height: 6px;
    }

    .dot.active {
        width: 18px;
    }
}
    </style>
    <script>
        // Achievements Carousel
const achievements = [
    {
        id: 1,
        title: "Award-Winning Design",
        date: "Dec 2024",
        image: "/A GIRL WITHOUT FACE.png",
        description: "Received the 'Digital Excellence Award' for innovative UI/UX design in web applications.",
        tag: "Award"
    },
    {
        id: 2,
        title: "Client Success Story",
        date: "June 2024",
        image: "https://images.unsplash.com/photo-1552664730-d307ca884978?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        description: "Helped major fintech client increase user engagement by 150% through redesigned platform.",
        tag: "Success"
    },
    {
        id: 3,
        title: "Open Source Contribution",
        date: "March 2024",
        image: "https://images.unsplash.com/photo-1556075798-4825dfaaf498?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",

        description: "Featured speaker at TechDesign 2024, presenting on 'Future of Web Interfaces'.",
        tag: "Speaking"
    },
    {
        id: 5,
        title: "Performance Optimization",
        date: "Nov 2023",
        image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        description: "Reduced page load times by 80% for e-commerce platform serving 1M+ users.",
        tag: "Technical"

    {

        image: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        description: "Started mentorship program that has helped 50+ junior developers advance their careers.",
        tag: "Leadership"
    },
    {
        id: 7,
        title: "Product Launch",
        date: "Aug 2023",
        image: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        description: "Successfully launched SaaS product that now serves 10,000+ active users.",
        tag: "Product"
    },
    {
        id: 8,
        title: "Research Publication",
        date: "July 2023",
        image: "https://images.unsplash.com/photo-1556761175-b413da4baf72?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        description: "Published research paper on 'AI in Web Design' in International Web Technologies Journal.",
        tag: "Research"
    },
    {
        id: 9,
        title: "Team Leadership",
        date: "May 2023",
        image: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        description: "Led cross-functional team of 12 to deliver complex enterprise application ahead of schedule.",
        tag: "Leadership"
    }
];

let activeIndex = 0;
let autoSlideInterval;

function initAchievementsCarousel() {
    const stage = document.getElementById('carousel-stage');
    const dotsContainer = document.getElementById('pagination-dots');

    if (!stage || !dotsContainer) return;

    // Clear existing content
    stage.innerHTML = '';
    dotsContainer.innerHTML = '';

    achievements.forEach((item, index) => {
        // Create card
        const card = document.createElement('div');
        card.className = 'carousel-card';
        card.id = `achievement-card-${index}`;
        card.onclick = () => {
            activeIndex = index;
            updateAchievementsCarousel();
        };

        card.innerHTML = `
            <div class="card-image" style="background-image: url('${item.image}')">
                <span class="expand-badge">View Details</span>
            </div>
            <div class="card-content">
                <div class="card-header">
                    <h3>${item.title}</h3>
                    <span class="tag-pill">${item.tag}</span>
                </div>
                <p>${item.description}</p>
                <div class="card-footer">
                    <i class="far fa-calendar"></i>
                    <small>${item.date}</small>
                </div>
            </div>
        `;

        stage.appendChild(card);

        // Create pagination dot
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.id = `achievement-dot-${index}`;
        dot.onclick = () => {
            activeIndex = index;
            updateAchievementsCarousel();
        };
        dotsContainer.appendChild(dot);
    });

    // Add event listeners for navigation buttons
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');

    if (nextBtn) nextBtn.onclick = nextAchievement;
    if (prevBtn) prevBtn.onclick = prevAchievement;

    updateAchievementsCarousel();
    startAutoSlide();
}

function updateAchievementsCarousel() {
    achievements.forEach((_, index) => {
        const card = document.getElementById(`achievement-card-${index}`);
        const dot = document.getElementById(`achievement-dot-${index}`);

        let offset = index - activeIndex;
        if (offset > Math.floor(achievements.length / 2)) offset -= achievements.length;
        if (offset < -Math.floor(achievements.length / 2)) offset += achievements.length;

        let positionClass = 'hidden';
        if (offset === 0) positionClass = 'active';
        else if (offset === -1) positionClass = 'left';
        else if (offset === 1) positionClass = 'right';
        else if (offset < -1) positionClass = 'far-left';
        else if (offset > 1) positionClass = 'far-right';

        if (card) {
            card.className = `carousel-card ${positionClass}`;

            // Add animation delay for smooth entrance
            card.style.animationDelay = `${Math.abs(offset) * 0.1}s`;
        }

        if (dot) {
            dot.className = `dot ${index === activeIndex ? 'active' : ''}`;
        }
    });
}

function nextAchievement() {
    activeIndex = (activeIndex + 1) % achievements.length;
    updateAchievementsCarousel();
    resetAutoSlide();
}



function prevAchievement() {
    activeIndex = (activeIndex - 1 + achievements.length) % achievements.length;
    updateAchievementsCarousel();
    resetAutoSlide();
}

function startAutoSlide() {
    clearInterval(autoSlideInterval);
    autoSlideInterval = setInterval(() => {
        nextAchievement();
    }, 5000);
}

function resetAutoSlide() {
    clearInterval(autoSlideInterval);
    startAutoSlide();
}

// Initialize achievements carousel when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
    initAchievementsCarousel();

    // Add keyboard navigation
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') nextAchievement();
        if (e.key === 'ArrowLeft') prevAchievement();
        if (e.key === ' ') {
            e.preventDefault();
            nextAchievement();
        }
    });

    // Pause auto-slide on hover
    const carouselContainer = document.querySelector('.carousel-container');
    if (carouselContainer) {
        carouselContainer.addEventListener('mouseenter', () => {
            clearInterval(autoSlideInterval);
        });

        carouselContainer.addEventListener('mouseleave', () => {
            startAutoSlide();
        });
    }
});
    </script>
